name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Prepend install snippet to release notes
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          body=$(gh release view "$TAG" --repo ${{ github.repository }} --json body --jq .body)
          {
            printf '## Install\n\n```bash\ncomposer require rixl/sdk:%s\n```\n\n' "$VERSION"
            printf '%s' "$body"
          } > /tmp/notes.md
          gh release edit "$TAG" --repo ${{ github.repository }} --notes-file /tmp/notes.md

  # Packagist auto-imports new tags from GitHub once the package is registered
  # at https://packagist.org/packages/submit. No publish step is needed in CI —
  # this job exists as a placeholder if you ever want to add one.
